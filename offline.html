<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#D2691E">
  <meta name="robots" content="noindex">
  <title>Offline – ByfiPlay</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/pwa.css">
  <style>
    .offline-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      background: #fff;
    }
    .offline-page h1 {
      color: chocolate;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .offline-page p {
      max-width: 28rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: #444;
    }
    .offline-page a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: chocolate;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
    }
    .offline-page a:hover {
      background: #b85a1a;
    }
  </style>
</head>
<body>
  <main class="offline-page">
    <img src="/img/IMG-20251201-WA0006.jpg" alt="ByfiPlay logo" width="80" height="80" style="object-fit:contain;margin-bottom:1.5rem;border-radius:12px;">
    <h1>You&rsquo;re Offline</h1>
    <p>
      It looks like you&rsquo;ve lost your internet connection. Some pages you&rsquo;ve visited
      before may still be available. Check your connection and try again.
    </p>
    <a href="/">Return to Home</a>
  </main>
</body>
</html>
